name: Module Build

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  bump_version:
    name: Bump Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      version_commit_hash: ${{ steps.get_hash.outputs.version_commit_hash }}
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Run bump_version script
        run: bash ./scripts/bump_version.sh

      - name: Commit version bump
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git diff --cached --quiet || git commit -m "ci: bump version"
          git push

      - name: Get new version
        id: get_version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n1 | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get commit hash
        id: get_hash
        run: |
          HASH=$(git rev-parse HEAD)
          echo "version_commit_hash=$HASH" >> $GITHUB_OUTPUT

  build_module:
    name: Build Module (Rust + WebUI)
    runs-on: ubuntu-latest
    needs: [bump_version]
    defaults:
      run:
        working-directory: ./webui
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0

      # --- Rust Build ---
      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          override: true

      - name: Add Android target
        run: rustup target add aarch64-linux-android

      - name: Install cargo-ndk
        run: cargo install cargo-ndk

      - name: Cache Cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache Cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: cargo-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-build-

      - name: Add Android target
        run: rustup target add aarch64-linux-android

      - name: Build Rust project for Android arm64-v8a
        run: cargo ndk -t arm64-v8a build --release

      - name: Copy Rust binary to module/bin
        run: |
          mkdir -p module
          cp target/aarch64-linux-android/release/cip module

      # --- WebUI Build ---
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24.14.0
          package-manager-cache: "pnpm"

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3
          cache: false

      - name: Install WebUI Dependencies
        run: pnpm install --frozen-lockfile

      - name: Build WebUI
        run: pnpm run build

      - name: Copy WebUI to module/webroot
        run: |
          mkdir -p ../module/webroot
          cp -r dist/* ../module/webroot/

  release:
    name: Package & Release Module
    runs-on: ubuntu-latest
    needs: [build_module, bump_version]
    steps:
      - name: Checkout Code with Submodules
        uses: actions/checkout@v5
        with:
          submodules: recursive
          fetch-depth: 0
          tags: true

      - name: Set Version
        id: version
        run: |
          VERSION=$(grep '^version =' Cargo.toml | head -n1 | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Copy module from build job
        run: |
          cp -r ../module ./module

      - name: Zip module
        run: |
          cd module
          zip -r ../ColorOSIconsPatch-${{ steps.version.outputs.version }}.zip ./*
          cd ../

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: ${{ steps.version.outputs.version }}
          files: ColorOSIconsPatch-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
